<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Player</title>
    <style>
      body {
        margin: 0;
        overflow: hidden; /* Hide scrollbars */
        background-color: black;
      }
      #player {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>

    <script>
      let player;
      const PLAYER_KEY = "livePlayerCommand"; // Unique key for this player in localStorage
      const LIVE_PLAYER_EVENT_KEY = 'livePlayerEvent';
      let videoDuration

      function loadYouTubeAPI() {
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api"; // Corrected YouTube API URL
        const firstScriptTag = document.getElementsByTagName("script")[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
      }

      function onYouTubeIframeAPIReady() {
        console.log("YouTube IFrame API is ready for LivePlayer.");
      }

      // Event listener for changes in localStorage
      window.addEventListener("storage", (event) => {
        if (event.key === PLAYER_KEY && event.newValue) {
          try {
            const data = JSON.parse(event.newValue);
            console.log(
              "Command received in LivePlayer via localStorage:",
              data
            );

            if (data.command === "loadVideo" && data.videoId) {
              if (player) {
                player.loadVideoById({
                  videoId: data.videoId,
                  playerVars: {
                    autoplay: 1,
                    controls: 0,
                    modestbranding: 1,
                    showinfo: 0,
                    rel: 0,
                    fs: 1,
                    iv_load_policy: 3,
                  },
                });
              } else {
                player = new YT.Player("player", {
                  videoId: data.videoId,
                  playerVars: {
                    autoplay: 1,
                    controls: 0,
                    modestbranding: 1,
                    showinfo: 0,
                    rel: 0,
                    fs: 1,
                    iv_load_policy: 3,
                  },
                  events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange,
                    onError: onPlayerError
                  },
                });
              }
            } else if (player) {
              switch (data.command) {
                case "play":
                  player.playVideo();
                  break;
                case "pause":
                  player.pauseVideo();
                  break;
                case "stop":
                  player.stopVideo();
                  break;
                case "mute":
                  player.mute();
                  break;
                case "unmute":
                  player.unMute();
                  break;
                case "setVolume":
                  if (typeof data.volume === "number") {
                    player.setVolume(data.volume);
                  }
                  break;
                case "seekTo":
                  if (typeof data.seconds === "number") {
                    player.seekTo(data.seconds, true);
                  }
                  break;
                case "destroy":
                  player.destroy();
                  player = null;
                  break;
              }
            }
          } catch (e) {
            console.error(
              "Error parsing localStorage command for LivePlayer:",
              e
            );
          }
        }
      });

      function onPlayerReady(event) {
        console.log("LivePlayer is ready!");
        event.target.playVideo();
        // event.target.mute(); // Commented out to allow unmuted playback on load
      }

      function onPlayerStateChange(event) {
        let state;
        switch (event.data) {
          case YT.PlayerState.ENDED:
            state = "ended";
             localStorage.setItem(
              LIVE_PLAYER_EVENT_KEY,
              JSON.stringify({ playerType: "live", event: "videoEnded" })
            );
            setTimeout(() => {
              localStorage.removeItem(LIVE_PLAYER_EVENT_KEY); // Clear the item after a short delay
            }, 100);
            break;
          case YT.PlayerState.PLAYING:
            state = "playing";
            break;
          case YT.PlayerState.PAUSED:
            state = "paused";
            break;
          case YT.PlayerState.BUFFERING:
            state = "buffering";
            break;
          case YT.PlayerState.CUED:
            state = "cued";
            break;
          case YT.PlayerState.UNSTARTED:
            state = "unstarted";
            break;
          default:
            state = "unknown";
        }
        console.log("LivePlayer state changed:", state);
      }

            function onPlayerError(event) {
        let errorMessage = "Unknown error";
        switch (event.data) {
          case 2:
            errorMessage = "Invalid video ID or video not found.";
            break;
          case 100:
            errorMessage = "Video not found.";
            break;
          case 101:
          case 150:
            errorMessage =
              "Video cannot be played in an embedded player (e.g., private video, restricted playback).";
            break;
        }
        console.error(
          "LoopPlayer: Error:",
          errorMessage,
          "Error code:",
          event.data
        );
     localStorage.setItem(
              LIVE_PLAYER_EVENT_KEY,
              JSON.stringify({ playerType: "live", event: "videoEnded" })
            );
            setTimeout(() => {
              localStorage.removeItem(LIVE_PLAYER_EVENT_KEY); // Clear the item after a short delay
            }, 100);
      }

            // Function to report events back to the main controller
      function reportEvent(eventName, data = {}) {
        const eventData = {
          playerType: "live",
          event: eventName,
          timestamp: Date.now(),
          ...data,
        };
        localStorage.setItem(LIVE_PLAYER_EVENT_KEY, JSON.stringify(eventData));
        // Clear the item after a short delay to ensure the 'storage' event fires cleanly
        setTimeout(() => {
          localStorage.removeItem(LIVE_PLAYER_EVENT_KEY);
        }, 100);
      }
      // --- CORRECTED CODE BLOCK ---
            setInterval(() => {
        // FIX 3: Add a guard clause to ensure the player object exists and is ready
        if (!player || typeof player.getPlayerState !== "function") {
          return;
        }
        if(!videoDuration) videoDuration = player.getDuration()
        const currentTime= player.getCurrentTime()
        // FIX 2: Check state using the correct method and constant
        if (player.getPlayerState() === YT.PlayerState.PLAYING) {
          reportEvent("timeUpdate", {
            // FIX 2: Get time using the correct method
            currentTime,
            remainingTime: videoDuration - currentTime
          });
        }
      }, 1000);
      loadYouTubeAPI();
    </script>
  </body>
</html>
